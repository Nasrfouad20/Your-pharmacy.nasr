<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول / إنشاء حساب</title>
  <link rel="stylesheet" href="css/login.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="login-container">

  <div class="form-box">
    <h2 id="form-title">تسجيل الدخول</h2>

    <!-- نموذج تسجيل الدخول -->
    <form id="login-form">
      <div class="input-group">
        <label for="login-phone">رقم الهاتف</label>
        <input type="tel" id="login-phone" placeholder="ادخل رقم الهاتف" required>
      </div>
      <div class="input-group">
        <label for="login-password">كلمة المرور</label>
        <input type="password" id="login-password" placeholder="ادخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn">تسجيل الدخول</button>
      <p class="switch-text">ليس لديك حساب؟ <span id="switch-to-signup">إنشاء حساب</span></p>
      <p class="switch-text">
  نسيت كلمة المرور؟ <span id="forgot-password">اضغط هنا</span>
    </p>

    </form>

    <!-- نموذج إنشاء حساب -->
    <form id="signup-form" style="display:none;">
      <div class="input-group">
        <label for="signup-name">الاسم الكامل</label>
        <input type="text" id="signup-name" placeholder="ادخل اسمك" required>
      </div>
      <div class="input-group">
        <label for="signup-phone">رقم الهاتف</label>
        <input type="tel" id="signup-phone" placeholder="ادخل رقم الهاتف" required>
      </div>
      <div class="input-group">
        <label for="signup-password">كلمة المرور</label>
        <input type="password" id="signup-password" placeholder="اختر كلمة مرور" required>
      </div>
      <button type="submit" class="btn">إنشاء حساب</button>
      <p class="switch-text">لديك حساب؟ <span id="switch-to-login">تسجيل الدخول</span></p>
    </form>

  </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
